<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cartas Pokémon Pro</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ffd6e0, #d6f0ff);
}

h1 {
    margin-top: 20px;
}

input, select {
    padding: 10px;
    border-radius: 20px;
    border: none;
    margin: 10px;
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #6699ff;
    color: white;
    cursor: pointer;
}

#resultados {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    margin: 15px;
    padding: 15px;
    width: 200px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
    opacity: 0;
    transform: translateY(30px);
    animation: aparecer 0.5s forwards;
}

.card:hover {
    transform: scale(1.08) rotate(1deg);
}

@keyframes aparecer {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

img {
    width: 120px;
}

</style>
</head>

<body>

<h1>✨ Pokédex Interactiva ✨</h1>

<input type="text" id="busqueda" placeholder="Buscar Pokémon...">
<select id="filtro">
    <option value="">Todos</option>
    <option value="fire">Fuego</option>
    <option value="water">Agua</option>
    <option value="grass">Planta</option>
    <option value="electric">Eléctrico</option>
    <option value="poison">Veneno</option>
    <option value="dragon">Dragón</option>
    <option value="fairy">Hada</option>
</select>

<button onclick="buscar()">Buscar</button>

<div id="resultados"></div>

<script>
const nombres = [
"bulbasaur","ivysaur","venusaur","charmander","charmeleon","charizard",
"squirtle","wartortle","blastoise","pikachu","raichu","sandshrew",
"nidoran-f","nidorina","nidoqueen","nidoran-m","nidorino","nidoking",
"clefairy","clefable","vulpix","ninetales","jigglypuff","wigglytuff",
"zubat","golbat","oddish","gloom","vileplume","paras",
"diglett","dugtrio","meowth","persian","psyduck","golduck",
"growlithe","arcanine","poliwag","poliwhirl","poliwrath",
"abra","kadabra","alakazam","machop","machoke","machamp",
"bellsprout","weepinbell"
];

let pokemons = [];

async function cargar() {
    for (let nombre of nombres) {
        let res = await fetch(`https://pokeapi.co/api/v2/pokemon/${nombre}`);
        let data = await res.json();

        pokemons.push({
            nombre: data.name,
            tipo: data.types[0].type.name,
            hp: data.stats[0].base_stat,
            imagen: data.sprites.front_default
        });
    }

    mostrar(pokemons);
}

function buscar() {
    let texto = document.getElementById("busqueda").value.toLowerCase();
    let tipo = document.getElementById("filtro").value;

    let filtrados = pokemons.filter(p =>
        p.nombre.includes(texto) &&
        (tipo === "" || p.tipo === tipo)
    );

    mostrar(filtrados);
}

function mostrar(lista) {
    let cont = document.getElementById("resultados");
    cont.innerHTML = "";

    if (lista.length === 0) {
        cont.innerHTML = "<p>No hay resultados 😢</p>";
        return;
    }

    lista.forEach(p => {
        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${p.nombre}</h3>
            <p>Tipo: ${p.tipo}</p>
            <p>HP: ${p.hp}</p>
            <img src="${p.imagen}">
        `;

        cont.appendChild(div);
    });
}

cargar();
</script>

</body>
</html>
